name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore backend/src/SmartMovieCatalog.Api/SmartMovieCatalog.Api.csproj

      - name: Build backend
        run: dotnet build backend/src/SmartMovieCatalog.Api/SmartMovieCatalog.Api.csproj --configuration Release --no-restore

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npm run build
