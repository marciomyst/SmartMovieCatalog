name: Snyk Security Scan

on:
  workflow_dispatch:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Restore frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Restore backend dependencies
        run: dotnet restore SmartMovieCatalog.slnx

      - name: Install Snyk CLI
        uses: snyk/actions/setup@v1.0.0

      - name: Snyk Open Source scan
        run: snyk test --all-projects --detection-depth=6 --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t smartmoviecatalog-api:ci \
            -f backend/src/SmartMovieCatalog.Api/Dockerfile \
            .

      - name: Snyk Container scan
        run: snyk container test smartmoviecatalog-api:ci --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code scan
        continue-on-error: true
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
